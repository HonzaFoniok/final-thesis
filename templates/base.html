<!doctype html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPVGantt</title>

    <link href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.min.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <script>
(function() {
    // find if user has rigths to current project
    const isAuthorized = {% if project and session.get('project_tokens', {}).get(project.id | string) %} true {% else %} false {% endif %};

    // fetch and checkbox might fall without this function
    window.getEditToken = function() {
        return isAuthorized ? "backend_session_active" : "";
    };

    // hiding dash and buttons in view-only mode
    document.addEventListener("DOMContentLoaded", () => {
        if (!isAuthorized) {
            const dashboardLink = document.getElementById('nav-dashboard');
            if (dashboardLink) {
                dashboardLink.style.display = 'none';
            }
        }
    });
})();
</script>

    <nav class="navbar">
        <div class="nav-brand">
            KPVGantt
            {% if project %}
            <span style="color: rgba(255,255,255,0.5);">|</span> <span class="project-name">Project: {{ project.name
                }}</span>
            {% endif %}
        </div>
        <div class="nav-links">
            <a href="/" id="nav-dashboard" >Dashboard</a>
            {% if project %}
            <a href="/project/{{ project.id }}/tasks">Gantt</a>
            <a href="/project/{{ project.id }}/resources">Resources</a>
            <a href="/project/{{ project.id }}/employees">Employees</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% block scripts %}
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const urlParams = new URLSearchParams(window.location.search);
                const token = urlParams.get('token');

                if (token) {
                        // find all links
                        const navLinks = document.querySelectorAll('.nav-link, a[href*="/project/"]');
                        
                        // add token to each link (if not done allready)
                    navLinks.forEach(link => {  
                        try {
                            const url = new URL(link.href);
                            url.searchParams.set('token', token);
                            link.href = url.toString();
                        }  
                        catch (e) {
                        }
                    });
                }
            });
        </script>
    {% endblock %}
</body>

</html>
